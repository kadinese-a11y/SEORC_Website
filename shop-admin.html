<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shop Admin | SEORC</title>
    <meta name="description" content="SEORC admin shop item management.">
    <link rel="stylesheet" href="styles.css?v=20260712-shop">
  </head>
  <body data-admin-role-required>
    <header class="site-header">
      <a class="brand" href="admin.html" aria-label="SEORC admin dashboard">
        <img class="brand-logo" src="assets/seorc-club-logo.png" alt="" aria-hidden="true">
        <span>
          <strong>SEORC</strong>
          <small>Shoalhaven Extreme Obstacle Racing Club</small>
        </span>
      </a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="admin.html">Admin</a>
        <a href="shop.html">View shop</a>
      </nav>
    </header>

    <main>
      <section class="page-title">
        <p class="eyebrow">Shop admin</p>
        <h1>Shop items.</h1>
        <p>Add, edit, publish, and remove items from the public shop front.</p>
      </section>

      <section class="admin-layout">
        <section class="registration-admin-list">
          <div class="admin-actions">
            <a class="button secondary form-submit" href="admin.html">Back to Admin dashboard</a>
            <a class="button secondary form-submit" href="shop.html">Open shop front</a>
            <a class="button secondary form-submit" href="shop-orders.html">Shop orders</a>
            <button class="button primary form-submit" type="button" data-add-shop-item>Add item</button>
          </div>

          <section class="show-class-panel">
            <div class="form-heading">
              <p class="eyebrow">Inventory</p>
              <h2>Current shop items</h2>
            </div>
            <div data-shop-admin-list><p class="empty-state">Loading shop items...</p></div>
          </section>
        </section>
      </section>
    </main>

    <script src="config/supabaseClient.js?v=20260615"></script>
    <script src="script.js?v=20260712-shop-order-flow"></script>
  </body>
</html>
