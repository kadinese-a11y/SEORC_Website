<!doctype html>
<html lang="en">
  <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Add Event | SEORC Admin</title><meta name="description" content="Add a SEORC club event."><link rel="stylesheet" href="styles.css?v=20260620-osm-location-search"></head>
  <body data-admin-role-required>
    <header class="site-header"><a class="brand" href="index.html" aria-label="SEORC home"><img class="brand-logo" src="assets/seorc-club-logo.png" alt="" aria-hidden="true"><span><strong>SEORC</strong><small>Shoalhaven Extreme Obstacle Racing Club</small></span></a><button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav"><span></span><span></span><span></span></button><nav class="site-nav" id="site-nav" aria-label="Admin navigation"><a href="admin.html">Dashboard</a><a class="active" href="add-event.html">Add event</a><a href="media-upload.html">Media upload</a></nav></header>
    <main><section class="page-title"><p class="eyebrow">Club events</p><h1>Add an event.</h1><p>Create a SEORC event or list an external clinic or show on the shared calendar.</p></section><section class="admin-layout"><section class="registration-admin-list"><div class="admin-actions"><a class="button secondary form-submit" href="admin.html">Back to Dashboard</a></div><form class="form-panel" data-event-admin-form><div class="form-heading"><p class="eyebrow">Event details</p><h2>New event</h2></div><div class="form-grid"><label>Type<select name="type" required><option value="club">Club Day</option><option value="show">SEORC Show</option><option value="clinic">SEORC Clinic</option><option value="external-show">External Show</option><option value="external-clinic">External Clinic</option></select></label><label>Date<input name="date" type="date" required></label><label>Title<input name="title" required></label><label>Location<input name="location" placeholder="Venue or street address, suburb" required><span class="field-note">Participants can open this location in Google Maps.</span></label></div><label>Description<textarea name="description" rows="5" required></textarea></label><div class="form-grid" data-external-event-fields hidden><label>Provider link<input name="provider_url" type="url" placeholder="https://..."></label><label>Cost<input name="external_cost" type="text" placeholder="e.g. $45, see provider"></label></div><button class="button primary form-submit">Save event</button></form></section></section></main>
    <footer class="site-footer"><p>Events are shared with the club calendar.</p><p class="footer-links"><a href="admin.html">Admin dashboard</a></p></footer><script src="config/supabaseClient.js?v=20260620"></script><script src="script.js?v=20260621-final-costs"></script>
  </body>
</html>
